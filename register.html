<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Taskr</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Task<span>r</span></a>
    <div id="nav-user-area" style="margin-left:auto;display:flex;gap:8px"></div>
  </div>
</nav>

<div class="auth-page" style="background:var(--sand)">
  <div class="auth-container" style="max-width:560px">
    <div class="auth-logo-mark">
      <span>Task<b>r</b></span>
      <div style="font-size:0.85rem;color:var(--slate);margin-top:4px">Create your free account</div>
    </div>

    <div class="auth-card">
      <h2>Join Taskr</h2>
      <p>Are you looking for services, or do you offer them?</p>

      <div class="role-select-grid" style="margin-top:20px">
        <label class="role-card selected">
          <input type="radio" name="role" value="customer" checked style="position:absolute;opacity:0" />
          <div class="role-icon">🏠</div>
          <div class="role-label">I need help</div>
          <div class="role-desc">Book services for my home, kids or garden</div>
        </label>
        <label class="role-card">
          <input type="radio" name="role" value="worker" style="position:absolute;opacity:0" />
          <div class="role-icon">🔨</div>
          <div class="role-label">I offer skills</div>
          <div class="role-desc">Provide services and earn on my own schedule</div>
        </label>
      </div>

      <form id="register-form">
        <div class="form-row">
          <div class="form-group">
            <label for="reg-name">Full name</label>
            <input type="text" id="reg-name" placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label for="reg-phone">Phone number</label>
            <input type="tel" id="reg-phone" placeholder="0XX XXX XXXX" />
          </div>
        </div>
        <div class="form-group">
          <label for="reg-email">Email address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-pwd">Create a password</label>
          <input type="password" id="reg-pwd" placeholder="At least 8 characters" required minlength="6" />
          <div class="form-hint">Min. 6 characters</div>
        </div>

        <div id="worker-fields" style="display:none">
          <div class="form-group">
            <label for="reg-service">Primary service you offer</label>
            <select id="reg-service">
              <option value="">Select a category…</option>
              <option>Home Cleaning</option>
              <option>Gardening</option>
              <option>Tutoring</option>
              <option>Plumbing</option>
              <option>Electrical</option>
              <option>Painting</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reg-area">Area you serve</label>
            <input type="text" id="reg-area" placeholder="e.g. Cape Town, Bellville" />
          </div>
        </div>

        <div style="background:var(--teal-faint);border-radius:var(--radius);padding:12px 16px;font-size:0.83rem;color:var(--slate);margin-bottom:20px">
          By registering you agree to our <a href="#" style="color:var(--teal)">Terms of Service</a> and <a href="#" style="color:var(--teal)">Privacy Policy</a>.
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>
      </form>

      <div class="auth-footer-text">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-ghost" onclick="State.setUser({name:'Guest User',email:'',role:'guest'}); window.location.href='../index.html'">Continue browsing as guest →</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  // show worker fields dynamically
  document.querySelectorAll('input[name="role"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.getElementById('worker-fields').style.display = this.value === 'worker' ? 'block' : 'none';
    });
  });
  document.querySelectorAll('.role-card').forEach(card => {
    card.addEventListener('click', function() {
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
      const inp = this.querySelector('input[name="role"]');
      if (inp) { inp.checked = true; inp.dispatchEvent(new Event('change')); }
    });
  });
</script>
</body>
</html>
